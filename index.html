<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin"> <!-- Critical for resolving Error 153 -->
    <title>YouTube Playlist Resume Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1200px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #1e1e1e;
            color: #fff;
            font-size: 1rem;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #ff0000;
        }
        button {
            padding: 12px 20px;
            border-radius: 6px;
            border: none;
            background-color: #ff0000;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #cc0000;
        }
        
        /* App workspace layout */
        .app-layout {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            width: 100%;
        }
        .main-content {
            flex: 2.5;
            min-width: 0;
        }
        #player-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 8px;
            display: none; 
        }
        #player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Sidebar Styling */
        .sidebar {
            flex: 1.2;
            background-color: #1e1e1e;
            border: 1px solid #292929;
            border-radius: 8px;
            padding: 15px;
            max-height: 480px; /* Aligns roughly with 16:9 player height */
            overflow-y: auto;
            display: none; /* Hidden until a playlist is loaded */
        }
        .sidebar h2 {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        #sidebar-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            background-color: #171717;
            transition: background 0.2s;
        }
        .sidebar-item:hover {
            background-color: #2a2a2a;
        }
        .sidebar-item.playing {
            background-color: #331111;
            border-left: 4px solid #ff0000;
        }
        .watch-checkbox {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #ff0000;
        }
        .video-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-grow: 1;
        }
        .video-title {
            font-size: 0.85rem;
            color: #fff;
            font-weight: 500;
            line-height: 1.2;
        }
        .video-index {
            font-size: 0.75rem;
            color: #888;
        }

        /* Bottom saved playlist section */
        .saved-section {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #292929;
            width: 100%;
            box-sizing: border-box;
        }
        .saved-section h2 {
            font-size: 1.3rem;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        .playlist-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #2d2d2d;
        }
        .playlist-item:last-child {
            border-bottom: none;
        }
        .playlist-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .playlist-id {
            font-weight: bold;
            color: #fff;
            word-break: break-all;
        }
        .playlist-id-sub {
            font-size: 0.75rem;
            color: #777;
            word-break: break-all;
        }
        .playlist-progress {
            font-size: 0.85rem;
            color: #aaa;
        }
        .item-actions {
            display: flex;
            gap: 8px;
        }
        .btn-secondary {
            background-color: #333;
        }
        .btn-secondary:hover {
            background-color: #444;
        }
        .btn-danger {
            background-color: #4b1a1a;
            color: #ff6b6b;
        }
        .btn-danger:hover {
            background-color: #722020;
        }

        /* Responsive stack for smaller screens */
        @media (max-width: 850px) {
            .app-layout {
                flex-direction: column;
            }
            .sidebar {
                max-height: 350px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>YouTube Playlist Resume Tracker</h1>
    
    <div class="input-group">
        <input type="text" id="playlist-input" placeholder="Paste YouTube Playlist URL or Playlist ID">
        <button id="load-btn">Load</button>
    </div>

    <div class="app-layout">
        <div class="main-content">
            <div id="player-wrapper">
                <div id="player"></div>
            </div>
        </div>
        
        <div id="sidebar" class="sidebar">
            <h2>Playlist Videos</h2>
            <ul id="sidebar-list"></ul>
        </div>
    </div>

    <div class="saved-section">
        <h2>Your Saved Playlists</h2>
        <ul id="playlist-list" class="playlist-list"></ul>
    </div>
</div>

<script>
    // Load the YouTube IFrame API asynchronously
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    let player;
    let currentPlaylistId = null;
    let trackerInterval = null;
    let isSidebarRendered = false;

    // Local video titles database cache
    let titleCache = JSON.parse(localStorage.getItem('yt_video_titles_cache')) || {};

    function saveTitleToCache(videoId, title) {
        titleCache[videoId] = title;
        localStorage.setItem('yt_video_titles_cache', JSON.stringify(titleCache));
    }

    // Helper to extract the Playlist ID from a URL
    function getPlaylistId(input) {
        try {
            const url = new URL(input);
            return url.searchParams.get('list') || input;
        } catch (e) {
            return input.trim();
        }
    }

    function onYouTubeIframeAPIReady() {
        renderPlaylistList();
        fetchMissingPlaylistTitles(); // Retroactive fix for already saved playlists
        
        document.getElementById('load-btn').addEventListener('click', () => {
            const val = document.getElementById('playlist-input').value;
            if (val) {
                const id = getPlaylistId(val);
                launchPlaylist(id, 0, 0);
            }
        });
    }

    // Loop through saved data on launch and fetch missing playlist names
    function fetchMissingPlaylistTitles() {
        const savedData = JSON.parse(localStorage.getItem('yt_playlist_resume')) || {};
        Object.keys(savedData).forEach(id => {
            if (!savedData[id].title) {
                fetchAndSavePlaylistTitle(id);
            }
        });
    }

    async function fetchAndSavePlaylistTitle(playlistId) {
        try {
            const response = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/playlist?list=${playlistId}`);
            const data = await response.json();
            if (data && data.title) {
                let savedData = JSON.parse(localStorage.getItem('yt_playlist_resume')) || {};
                if (savedData[playlistId]) {
                    savedData[playlistId].title = data.title;
                } else {
                    savedData[playlistId] = {
                        index: 0,
                        seconds: 0,
                        updatedAt: Date.now(),
                        title: data.title,
                        watched: []
                    };
                }
                localStorage.setItem('yt_playlist_resume', JSON.stringify(savedData));
                renderPlaylistList();
            }
        } catch (e) {
            console.error("Error fetching playlist title:", e);
        }
    }

    function launchPlaylist(playlistId, savedIndex = 0, savedSeconds = 0) {
        currentPlaylistId = playlistId;
        clearInterval(trackerInterval);
        isSidebarRendered = false; // Reset the rendering flag for the new playlist

        // Display player container
        const wrapper = document.getElementById('player-wrapper');
        wrapper.style.display = 'block';

        // Hide sidebar until playlist successfully cues and loads
        document.getElementById('sidebar').style.display = 'none';

        if (player) {
            player.destroy();
        }

        player = new YT.Player('player', {
            host: 'https://www.youtube-nocookie.com', // Bypasses local file restriction error (Error 153)
            playerVars: {
                enablejsapi: 1,
                autoplay: 1 
            },
            events: {
                'onReady': (event) => {
                    event.target.loadPlaylist({
                        list: playlistId,
                        index: savedIndex,
                        startSeconds: savedSeconds
                    });
                    
                    // Fetch playlist metadata name
                    fetchAndSavePlaylistTitle(playlistId);
                    trackerInterval = setInterval(saveCurrentProgress, 2500);
                },
                'onStateChange': () => {
                    saveCurrentProgress();
                    updatePlaylistSidebar();
                }
            }
        });
    }

    function saveCurrentProgress() {
        if (!player || typeof player.getPlaylistIndex !== 'function') return;

        try {
            const index = player.getPlaylistIndex();
            const seconds = Math.floor(player.getCurrentTime());
            const playlistVideos = player.getPlaylist() || [];
            const total = playlistVideos.length;

            if (index !== null && index >= 0 && !isNaN(index)) {
                let savedData = JSON.parse(localStorage.getItem('yt_playlist_resume')) || {};
                
                const existingWatched = savedData[currentPlaylistId]?.watched || [];
                const existingTitle = savedData[currentPlaylistId]?.title || null; // Retain title info
                
                savedData[currentPlaylistId] = {
                    index: index,
                    seconds: seconds,
                    updatedAt: Date.now(),
                    totalVideos: total,
                    watched: existingWatched,
                    title: existingTitle
                };
                localStorage.setItem('yt_playlist_resume', JSON.stringify(savedData));
                renderPlaylistList();
            }
        } catch (e) {
            console.error("Progress saving failed:", e);
        }
    }

    // Generates sidebar interface once player resolves playlist data
    function updatePlaylistSidebar() {
        if (!player || typeof player.getPlaylist !== 'function') return;
        
        const playlistVideos = player.getPlaylist();
        if (playlistVideos && playlistVideos.length > 0) {
            if (!isSidebarRendered) {
                renderSidebar(playlistVideos);
                isSidebarRendered = true;
            }
            highlightCurrentVideo();
        }
    }

    function renderSidebar(playlistVideos) {
        const sidebar = document.getElementById('sidebar');
        const sidebarList = document.getElementById('sidebar-list');
        sidebar.style.display = 'block';
        sidebarList.innerHTML = '';
        
        const savedData = JSON.parse(localStorage.getItem('yt_playlist_resume')) || {};
        const watchedList = (savedData[currentPlaylistId] && savedData[currentPlaylistId].watched) || [];
        
        playlistVideos.forEach((videoId, index) => {
            const isWatched = watchedList.includes(index);
            const cachedTitle = titleCache[videoId];
            
            const li = document.createElement('li');
            li.className = 'sidebar-item';
            li.id = `sidebar-item-${index}`;
            li.onclick = () => jumpToVideo(index);
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'watch-checkbox';
            checkbox.id = `checkbox-${index}`;
            checkbox.checked = isWatched;
            checkbox.onclick = (e) => toggleWatched(e, index);
            
            const videoInfo = document.createElement('div');
            videoInfo.className = 'video-info';
            
            const indexSpan = document.createElement('span');
            indexSpan.className = 'video-index';
            indexSpan.innerText = `Video #${index + 1}`;
            
            const titleSpan = document.createElement('span');
            titleSpan.className = 'video-title';
            titleSpan.id = `video-title-${index}`;
            titleSpan.innerText = cachedTitle || 'Loading title...';
            
            videoInfo.appendChild(indexSpan);
            videoInfo.appendChild(titleSpan);
            
            li.appendChild(checkbox);
            li.appendChild(videoInfo);
            sidebarList.appendChild(li);
            
            // Fetch titles asynchronously in the background if they aren't cached
            if (!cachedTitle) {
                fetchAndPopulateTitle(videoId, index);
            }
        });
    }

    async function fetchAndPopulateTitle(videoId, index) {
        try {
            const response = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
            const data = await response.json();
            if (data && data.title) {
                saveTitleToCache(videoId, data.title);
                const titleEl = document.getElementById(`video-title-${index}`);
                if (titleEl) {
                    titleEl.innerText = data.title;
                }
            }
        } catch (e) {
            console.error(`Error loading title for video ID: ${videoId}`, e);
        }
    }

    function highlightCurrentVideo() {
        if (!player || typeof player.getPlaylistIndex !== 'function') return;
        const currentIndex = player.getPlaylistIndex();
        
        // Remove active class from all items
        document.querySelectorAll('.sidebar-item').forEach(el => {
            el.classList.remove('playing');
        });
        
        // Add active class to current playing item
        const activeItem = document.getElementById(`sidebar-item-${currentIndex}`);
        if (activeItem) {
            activeItem.classList.add('playing');
            
            // Auto-scroll the sidebar to keep active video in view
            activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            // Auto-check as watched when it is playing
            autoMarkAsWatched(currentIndex);
        }
    }

    function jumpToVideo(index) {
        if (player && typeof player.playVideoAt === 'function') {
            player.playVideoAt(index);
        }
    }

    function autoMarkAsWatched(index) {
        let savedData = JSON.parse(localStorage.getItem('yt_playlist_resume')) || {};
        if (!savedData[currentPlaylistId]) return;
        
        if (!savedData[currentPlaylistId].watched) {
            savedData[currentPlaylistId].watched = [];
        }
        
        const watchedList = savedData[currentPlaylistId].watched;
        if (!watchedList.includes(index)) {
            watchedList.push(index);
            localStorage.setItem('yt_playlist_resume', JSON.stringify(savedData));
            
            const checkbox = document.getElementById(`checkbox-${index}`);
            if (checkbox) {
                checkbox.checked = true;
            }
            renderPlaylistList();
        }
    }

    function toggleWatched(event, index) {
        event.stopPropagation(); // Prevents jumping to the video when clicking only the checkbox
        
        let savedData = JSON.parse(localStorage.getItem('yt_playlist_resume')) || {};
        if (!savedData[currentPlaylistId]) {
            savedData[currentPlaylistId] = { index: 0, seconds: 0, updatedAt: Date.now(), watched: [] };
        }
        if (!savedData[currentPlaylistId].watched) {
            savedData[currentPlaylistId].watched = [];
        }
        
        const watchedList = savedData[currentPlaylistId].watched;
        const pos = watchedList.indexOf(index);
        
        if (pos > -1) {
            watchedList.splice(pos, 1);
        } else {
            watchedList.push(index);
        }
        
        localStorage.setItem('yt_playlist_resume', JSON.stringify(savedData));
        renderPlaylistList();
    }

    function renderPlaylistList() {
        const listEl = document.getElementById('playlist-list');
        listEl.innerHTML = '';
        
        const savedData = JSON.parse(localStorage.getItem('yt_playlist_resume')) || {};
        const keys = Object.keys(savedData).sort((a,b) => savedData[b].updatedAt - savedData[a].updatedAt);

        if (keys.length === 0) {
            listEl.innerHTML = '<li style="color: #666; text-align: center; padding: 15px;">No saved playlists yet</li>';
            return;
        }

        keys.forEach(id => {
            const item = savedData[id];
            
            const li = document.createElement('li');
            li.className = 'playlist-item';
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'playlist-info';
            
            // If the item has a title, show it. Otherwise show the ID as fallback.
            const titleSpan = document.createElement('span');
            titleSpan.className = 'playlist-id';
            titleSpan.innerText = item.title ? item.title : `Playlist ID: ${id}`;
            
            infoDiv.appendChild(titleSpan);

            // If the title exists, render the ID in a smaller font beneath it
            if (item.title) {
                const subSpan = document.createElement('span');
                subSpan.className = 'playlist-id-sub';
                subSpan.innerText = `ID: ${id}`;
                infoDiv.appendChild(subSpan);
            }
            
            const totalStr = item.totalVideos ? ` of ${item.totalVideos}` : '';
            const watchedCount = item.watched ? item.watched.length : 0;
            const watchedStr = item.totalVideos ? ` (${watchedCount} watched)` : '';

            const progressSpan = document.createElement('span');
            progressSpan.className = 'playlist-progress';
            progressSpan.innerText = `Last watched: Video #${item.index + 1}${totalStr} at ${formatTime(item.seconds)}${watchedStr}`;
            
            infoDiv.appendChild(progressSpan);
            
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'item-actions';
            
            const resumeBtn = document.createElement('button');
            resumeBtn.className = 'btn-secondary';
            resumeBtn.innerText = 'Resume';
            resumeBtn.onclick = () => launchPlaylist(id, item.index, item.seconds);
            
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-danger';
            deleteBtn.innerText = 'Delete';
            deleteBtn.onclick = () => {
                delete savedData[id];
                localStorage.setItem('yt_playlist_resume', JSON.stringify(savedData));
                renderPlaylistList();
            };
            
            actionsDiv.appendChild(resumeBtn);
            actionsDiv.appendChild(deleteBtn);
            
            li.appendChild(infoDiv);
            li.appendChild(actionsDiv);
            listEl.appendChild(li);
        });
    }

    function formatTime(totalSeconds) {
        if (isNaN(totalSeconds) || totalSeconds < 0) return '0:00';
        const mins = Math.floor(totalSeconds / 60);
        const secs = totalSeconds % 60;
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }
</script>
</body>
</html>
